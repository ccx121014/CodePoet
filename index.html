<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodePoet - 代码写诗生成器</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖋️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #1a1a2e;
      --color-secondary: #16213e;
      --color-accent-red: #e94560;
      --color-indigo: #0f3460;
      --color-terminal-green: #00ff41;
      --color-text-light: #eaeaea;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: var(--color-text-light);
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; position: relative; }
    .bg-blob, .bg-blob-2 {
      position: fixed; width: 24rem; height: 24rem; border-radius: 50%;
      filter: blur(6rem); opacity: 0.2; animation: pulse 4s ease-in-out infinite; pointer-events: none;
    }
    .bg-blob { top: 25%; left: 25%; background: var(--color-accent-red); }
    .bg-blob-2 { bottom: 25%; right: 25%; background: #4f46e5; animation-delay: 2s; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.1); opacity: 0.3; }
    }
    header { text-align: center; margin-bottom: 3rem; position: relative; z-index: 10; }
    h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; background: linear-gradient(to right, var(--color-accent-red), #a855f7, #4f46e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { font-size: 1.25rem; color: #9ca3af; max-width: 36rem; margin: 0 auto 1rem; }
    .tags { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }
    .tag { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; }
    .tag-red { background: rgba(233, 69, 96, 0.2); color: var(--color-accent-red); }
    .tag-purple { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
    .tag-indigo { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
    .panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-radius: 0.75rem; padding: 1.5rem; border: 1px solid rgba(31, 41, 55, 1); }
    .style-section { margin-bottom: 1.5rem; }
    .section-title { display: flex; align-items: center; gap: 0.5rem; font-size: 1.125rem; font-weight: bold; color: #d1d5db; margin-bottom: 1rem; }
    .style-category { margin-bottom: 1rem; }
    .category-label { font-size: 0.875rem; color: #6b7280; margin-bottom: 0.5rem; }
    .style-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    @media (max-width: 768px) { .style-grid { grid-template-columns: repeat(2, 1fr); } }
    .style-btn { padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; border: none; cursor: pointer; transition: all 0.2s; background: #1f2937; color: #d1d5db; }
    .style-btn:hover { background: #374151; color: white; }
    .style-btn.active { background: linear-gradient(to right, #a855f7, #ec4899); color: white; font-weight: 500; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
    .style-preview { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #374151; }
    .style-preview-label { font-size: 0.75rem; color: #6b7280; margin-bottom: 0.5rem; }
    .style-preview-content { padding: 0.75rem; background: linear-gradient(to right, #fef3c7, #fde68a); border-radius: 0.5rem; border: 1px solid #fbbf24; }
    .style-preview-content p { font-size: 0.875rem; color: #374151; font-style: italic; font-family: 'Noto Serif SC', serif; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    .code-panel { display: flex; flex-direction: column; height: 100%; }
    .code-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .code-title { font-size: 1.25rem; font-weight: bold; color: var(--color-terminal-green); }
    .char-count { font-size: 0.875rem; color: #6b7280; }
    .code-input-wrapper { flex: 1; position: relative; }
    textarea { width: 100%; height: 200px; background: black; border: 2px solid var(--color-terminal-green); border-radius: 0.5rem; padding: 1rem; color: var(--color-terminal-green); font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.875rem; resize: none; outline: none; transition: box-shadow 0.2s; }
    textarea::placeholder { color: #4b5563; }
    textarea:focus { box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.3); }
    .clear-btn { position: absolute; top: 0.5rem; right: 0.5rem; padding: 0.25rem 0.75rem; background: var(--color-terminal-green); color: black; border: none; border-radius: 0.25rem; font-size: 0.75rem; cursor: pointer; transition: background 0.2s; }
    .clear-btn:hover { background: #4ade80; }
    .generate-btn { width: 100%; margin-top: 1rem; padding: 0.75rem; background: var(--color-accent-red); color: white; font-weight: bold; border: none; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
    .generate-btn:hover:not(:disabled) { background: #dc2626; transform: scale(1.02); }
    .generate-btn:active:not(:disabled) { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .poetry-panel { display: flex; flex-direction: column; height: 100%; }
    .generating-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 280px; }
    .generating-state.visible { display: flex; }
    .generating-icon { font-size: 4rem; margin-bottom: 1rem; animation: bounce 1s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .generating-text { font-size: 1.25rem; color: #9ca3af; }
    .loading-dots { display: flex; gap: 0.25rem; margin-top: 0.5rem; }
    .loading-dot { width: 0.5rem; height: 0.5rem; background: var(--color-accent-red); border-radius: 50%; animation: bounce 1s infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .loading-dot:nth-child(3) { animation-delay: 0.3s; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 280px; color: #4b5563; }
    .empty-state.hidden { display: none; }
    .empty-icon { font-size: 4rem; opacity: 0.3; margin-bottom: 1rem; }
    .empty-text { font-size: 1.125rem; }
    .empty-hint { font-size: 0.875rem; margin-top: 0.5rem; }
    .poetry-content { display: none; flex-direction: column; height: 100%; }
    .poetry-content.visible { display: flex; }
    .poetry-header { text-align: center; margin-bottom: 1rem; }
    .poetry-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; background: linear-gradient(to right, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: 'Noto Serif SC', serif; }
    .poetry-style-tag { display: inline-block; padding: 0.25rem 0.75rem; background: #4f46e5; color: white; font-size: 0.75rem; border-radius: 9999px; }
    .analysis-section { margin-bottom: 0.75rem; }
    .analysis-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #9ca3af; margin-bottom: 0.5rem; }
    .tag-pill { display: inline-block; padding: 0.25rem 0.75rem; font-size: 0.75rem; border-radius: 9999px; margin-right: 0.25rem; margin-bottom: 0.25rem; }
    .tag-algo { background: linear-gradient(to right, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2)); border: 1px solid rgba(168, 85, 247, 0.3); color: #d8b4fe; }
    .tag-style { background: linear-gradient(to right, rgba(59, 130, 246, 0.2), rgba(6, 182, 212, 0.2)); border: 1px solid rgba(59, 130, 246, 0.3); color: #93c5fd; }
    .personality-box { padding: 0.5rem; background: linear-gradient(to right, rgba(245, 158, 11, 0.1), rgba(249, 115, 22, 0.1)); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 0.5rem; margin-top: 0.5rem; }
    .personality-text { font-size: 0.875rem; color: #fcd34d; }
    .poem-display { flex: 1; background: linear-gradient(to bottom right, #fef3c7, #fde68a); border-radius: 0.5rem; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); position: relative; overflow: hidden; }
    .poem-bg-1, .poem-bg-2 { position: absolute; border-radius: 50%; opacity: 0.2; }
    .poem-bg-1 { top: 0; left: 0; width: 8rem; height: 8rem; background: linear-gradient(to bottom right, #fde68a, transparent); }
    .poem-bg-2 { bottom: 0; right: 0; width: 10rem; height: 10rem; background: linear-gradient(to top left, #fde68a, transparent); }
    .poem-lines { position: relative; z-index: 1; }
    .poem-line { font-size: 1.25rem; line-height: 1.75; color: #1f2937; font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1); opacity: 0; transition: opacity 0.6s ease-in-out; }
    .poem-line.visible { opacity: 1; }
    .copy-btn { position: absolute; bottom: 1rem; right: 1rem; padding: 0.25rem 0.75rem; background: #4f46e5; color: white; border: none; border-radius: 0.25rem; font-size: 0.75rem; cursor: pointer; transition: background 0.2s; z-index: 2; }
    .copy-btn:hover { background: #4338ca; }
    .copy-btn.copied { background: #10b981; }
    .examples-section { background: rgba(15, 23, 42, 0.8); border-radius: 0.5rem; padding: 1rem; margin-bottom: 1.5rem; }
    .examples-title { display: flex; align-items: center; gap: 0.5rem; font-size: 1.125rem; font-weight: bold; color: #d1d5db; margin-bottom: 0.75rem; }
    .examples-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
    @media (max-width: 768px) { .examples-grid { grid-template-columns: repeat(2, 1fr); } }
    .example-btn { padding: 0.5rem 0.75rem; background: #1f2937; border: 1px solid #374151; border-radius: 0.5rem; text-align: left; cursor: pointer; transition: all 0.2s; }
    .example-btn:hover { background: #374151; border-color: var(--color-accent-red); }
    .example-name { font-size: 0.875rem; color: #d1d5db; font-weight: 500; }
    .example-keywords { font-size: 0.75rem; color: #6b7280; margin-top: 0.25rem; }
    footer { text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(31, 41, 55, 0.5); color: #4b5563; font-size: 0.875rem; }
    .keyword-display { margin-top: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.3); border-radius: 0.5rem; font-size: 0.75rem; color: #a5b4fc; }
  </style>
</head>
<body>
  <div class="bg-blob"></div>
  <div class="bg-blob-2"></div>
  
  <div class="container">
    <header>
      <h1>🖋️ 代码写诗生成器</h1>
      <p class="subtitle">将你的代码转化为诗意，让程序人生充满墨香</p>
      <div class="tags">
        <span class="tag tag-red">16种诗歌风格</span>
        <span class="tag tag-purple">算法识别</span>
        <span class="tag tag-indigo">码风分析</span>
      </div>
    </header>

    <div class="style-section panel">
      <div class="section-title">✨ 诗歌风格</div>
      <div class="style-category">
        <div class="category-label">古典风格</div>
        <div class="style-grid" id="classicStyles"></div>
      </div>
      <div class="style-category">
        <div class="category-label">现代风格</div>
        <div class="style-grid" id="modernStyles"></div>
      </div>
      <div class="style-category">
        <div class="category-label">特色风格</div>
        <div class="style-grid" id="specialStyles"></div>
      </div>
      <div class="style-preview">
        <div class="style-preview-label">当前风格预览</div>
        <div class="style-preview-content">
          <p id="stylePreview">选择一个风格开始创作...</p>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel code-panel">
        <div class="code-header">
          <span class="code-title">代码输入</span>
          <span class="char-count" id="charCount">0 字符</span>
        </div>
        <div class="code-input-wrapper">
          <textarea id="codeInput" placeholder="在此粘贴代码..."></textarea>
          <button class="clear-btn" onclick="clearCode()">清空</button>
        </div>
        <div class="keyword-display" id="keywordDisplay">提取的关键字将显示在这里...</div>
        <button class="generate-btn" id="generateBtn" onclick="generatePoem()">生成诗意 ✨</button>
      </div>

      <div class="panel poetry-panel">
        <div id="generatingState" class="generating-state">
          <div class="generating-icon">🖋️</div>
          <div class="generating-text">正在挥毫...</div>
          <div class="loading-dots">
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
          </div>
        </div>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon">📜</div>
          <p class="empty-text">左边粘贴代码</p>
          <p class="empty-hint">点击生成诗意</p>
        </div>

        <div id="poetryContent" class="poetry-content">
          <div class="poetry-header">
            <h3 class="poetry-title" id="poemTitle"></h3>
            <span class="poetry-style-tag" id="poemStyleTag"></span>
          </div>

          <div id="algoSection" class="analysis-section" style="display: none;">
            <div class="analysis-label">🔍 代码解读：</div>
            <div id="algoTags"></div>
          </div>

          <div id="styleSection" class="analysis-section" style="display: none;">
            <div class="analysis-label">🎨 风格分析：</div>
            <div id="styleTags"></div>
            <div id="personalityBox" class="personality-box" style="display: none;">
              <span class="personality-text">👤 编程人格：<strong id="personalityText"></strong></span>
            </div>
          </div>

          <div class="poem-display">
            <div class="poem-bg-1"></div>
            <div class="poem-bg-2"></div>
            <div class="poem-lines" id="poemLines"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyPoem()">复制诗句</button>
          </div>
        </div>
      </div>
    </div>

    <div class="examples-section">
      <div class="examples-title">📚 示例代码</div>
      <div class="examples-grid" id="examplesGrid"></div>
    </div>

    <footer>
      <p>代码无情，诗有意 🖋️ | 从诗经到赛博朋克，16种风格任你选择</p>
    </footer>
  </div>

  <script>
    // 诗歌风格配置
    const poetryStyles = {
      classic: [
        { id: 'jueju', name: '七言绝句', preview: '代码行行如流水，轮回众生皆过客...' },
        { id: 'shijing', name: '诗经', preview: '关关雎鸠，在河之洲。窈窕代码，君子好逑...' },
        { id: 'chuci', name: '楚辞', preview: '帝代码之苗裔兮，朕先考之正统...' },
        { id: 'yuefu', name: '乐府', preview: '青青园中葵，朝露待日晞...' },
        { id: 'wuyan', name: '五言律诗', preview: '空山新雨后，天气晚来秋...' },
        { id: 'qiyan', name: '七言律诗', preview: '锦瑟无端五十弦，一弦一柱思华年...' },
        { id: 'ci', name: '宋词', preview: '独立寒秋，湘江北去，橘子洲头...' },
        { id: 'yuanqu', name: '元曲', preview: '枯藤老树昏鸦，小桥流水人家...' },
      ],
      modern: [
        { id: 'modern', name: '现代诗', preview: '我在轮回里走了很久，以为出口在前方...' },
        { id: 'menglong', name: '朦胧诗', preview: '黑夜给了我黑色的眼睛，我却用它寻找光明...' },
        { id: 'yishiliu', name: '意象流', preview: '指针飘过——记忆的水面，涟漪散开...' },
        { id: 'sanwen', name: '散文诗', preview: '燕子去了，有再来的时候...' },
        { id: 'minimal', name: '极简诗', preview: '等待。等待。等待。编译完成了吗？没有。' },
      ],
      special: [
        { id: 'zen', name: '禅诗', preview: '看山是山，看代码是代码...' },
        { id: 'cyberpunk', name: '赛博朋克', preview: '01001001 在霓虹的海洋里，我是一串二进制...' },
        { id: 'gufengrap', name: '古风说唱', preview: 'Yo Yo Yo 代码行行飘 函数在召唤...' },
        { id: 'dayou', name: '打油诗', preview: '代码写尽三千行，bug恰似满天星...' },
        { id: 'haiku', name: '俳句', preview: '古池や 蛙飛び込む 水の音' },
        { id: 'sonnet', name: '十四行诗', preview: '当我望着你的代码在屏幕上闪烁...' },
        { id: 'programmer', name: '程序员诗', preview: 'Bug生Bug死Bug生，调试三日头已空...' },
      ]
    };

    // 示例代码
    const examples = [
      { name: '快速排序', keywords: '递归 函数 循环 抉择', code: `function quickSort(arr) {
  if (arr.length <= 1) return arr;
  const pivot = arr[Math.floor(arr.length / 2)];
  const left = arr.filter(x => x < pivot);
  const right = arr.filter(x => x > pivot);
  return [...quickSort(left), pivot, ...quickSort(right)];
}` },
      { name: '二分查找', keywords: '函数 循环 抉择', code: `function binarySearch(arr, target) {
  let left = 0, right = arr.length - 1;
  while (left <= right) {
    const mid = Math.floor((left + right) / 2);
    if (arr[mid] === target) return mid;
    if (arr[mid] < target) left = mid + 1;
    else right = mid - 1;
  }
  return -1;
}` },
      { name: '动态规划', keywords: '函数 循环 抉择', code: `function fibonacci(n) {
  const dp = [0, 1];
  for (let i = 2; i <= n; i++) {
    dp[i] = dp[i - 1] + dp[i - 2];
  }
  return dp[n];
}` },
      { name: '广度优先', keywords: '函数 循环 队列', code: `function bfs(graph, start) {
  const visited = new Set();
  const queue = [start];
  while (queue.length > 0) {
    const node = queue.shift();
    if (!visited.has(node)) {
      visited.add(node);
      queue.push(...graph[node]);
    }
  }
  return visited;
}` },
      { name: '深度优先', keywords: '函数 递归 循环', code: `function dfs(graph, node, visited = new Set()) {
  if (visited.has(node)) return;
  visited.add(node);
  for (const neighbor of graph[node]) {
    dfs(graph, neighbor, visited);
  }
  return visited;
}` },
      { name: '图论算法', keywords: '函数 循环 抉择', code: `function dijkstra(graph, start) {
  const dist = {};
  const pq = new PriorityQueue();
  pq.enqueue(start, 0);
  while (!pq.isEmpty()) {
    const [node, d] = pq.dequeue();
    if (dist[node]) continue;
    dist[node] = d;
    for (const [neighbor, w] of graph[node]) {
      pq.enqueue(neighbor, d + w);
    }
  }
  return dist;
}` },
      { name: '冒泡排序', keywords: '循环 循环 抉择 函数', code: `void bubbleSort(int arr[], int n) {
  for (int i = 0; i < n-1; i++) {
    for (int j = 0; j < n-i-1; j++) {
      if (arr[j] > arr[j+1]) {
        swap(arr[j], arr[j+1]);
      }
    }
  }
}` },
      { name: '归并排序', keywords: '函数 循环 递归', code: `void mergeSort(int arr[], int l, int r) {
  if (l >= r) return;
  int m = l + (r - l) / 2;
  mergeSort(arr, l, m);
  mergeSort(arr, m + 1, r);
  merge(arr, l, m, r);
}` },
      { name: '递归斐波那契', keywords: '函数 抉择 递归', code: `int fibonacci(int n) {
  if (n <= 1) return n;
  return fibonacci(n-1) + fibonacci(n-2);
}` },
      { name: 'Hello World', keywords: '函数', code: `cout << "Hello, World!" << endl;` },
    ];

    // 代码关键字映射
    const keywordMap = {
      '循环': ['for', 'while', 'loop', 'iterate', '遍历', 'do'],
      '抉择': ['if', 'else', 'switch', 'case', '?:', 'elif'],
      '归去': ['return', '=>', 'goto'],
      '虚无': ['null', 'nil', 'None', 'undefined', 'void'],
      '真伪': ['true', 'false', 'True', 'False', '0', '1'],
      '函数': ['function', 'func', 'def', 'fn', '()'],
      '定数': ['const', 'let', 'var', 'int', 'string', 'float', 'double'],
      '试探': ['try', 'catch', 'throw', 'except', 'error'],
      '无尽': ['while', 'for', 'infinite'],

    }

    // 生成诗歌
    function generatePoem() {
      const code = document.getElementById('codeInput').value.trim();
      if (!code) return;

      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('generatingState').classList.add('visible');
      document.getElementById('poetryContent').classList.remove('visible');

      setTimeout(() => {
        document.getElementById('generatingState').classList.remove('visible');
        document.getElementById('poetryContent').classList.add('visible');

        const keywords = extractKeywords(code);
        const algorithms = detectAlgorithms(code);
        const codeStyles = detectCodeStyles(code);
        const personality = getPersonality();

        // 转换为诗意关键词
        const poeticKeywords = keywords.map(k => getRandomPoetryKeyword(k));
        const kw1 = poeticKeywords[Math.floor(Math.random() * poeticKeywords.length)] || '循环';
        const kw2 = poeticKeywords[Math.floor(Math.random() * poeticKeywords.length)] || '抉择';

        // 优先使用算法专属诗歌
        let template = null;
        let title = '';
        
        if (algorithms.length > 0) {
          const primaryAlgo = algorithms[0].toLowerCase().replace(/\s+/g, '');
          if (algorithmPoetry[primaryAlgo]) {
            const algoTemplates = algorithmPoetry[primaryAlgo];
            const available = algoTemplates.filter(t => !isRecentlyUsed('algo_' + primaryAlgo + '_' + t.name));
            if (available.length > 0) {
              template = available[Math.floor(Math.random() * available.length)];
              markTemplateUsed('algo_' + primaryAlgo + '_' + template.name);
            }
          }
        }

        // 使用当前风格的模板
        if (!template) {
          const styleTemplates = poemTemplates[currentStyle] || poemTemplates.jueju;
          const available = styleTemplates.filter(t => !isRecentlyUsed(currentStyle + '_' + t.name));
          if (available.length > 0) {
            template = available[Math.floor(Math.random() * available.length)];
            markTemplateUsed(currentStyle + '_' + template.name);
          } else {
            // 随机选择
            template = styleTemplates[Math.floor(Math.random() * styleTemplates.length)];
            markTemplateUsed(currentStyle + '_' + template.name);
          }
        }

        // 替换占位符生成诗歌
        const templateKeywords = template.keywords && template.keywords.length > 0 
          ? template.keywords.map(k => getRandomPoetryKeyword(k))
          : poeticKeywords;
        
        const content = template.lines.map(line => 
          replacePlaceholders(line, templateKeywords, kw1, kw2)
        );

        currentPoem = { title: template.name, content };

        // 更新UI
        document.getElementById('poemTitle').textContent = template.name;
        document.getElementById('poemStyleTag').textContent = getStyleName(currentStyle);

        if (algorithms.length > 0) {
          document.getElementById('algoSection').style.display = 'block';
          document.getElementById('algoTags').innerHTML = algorithms.map(a => `<span class="tag-pill tag-algo">${a}</span>`).join('');
        } else {
          document.getElementById('algoSection').style.display = 'none';
        }

        if (codeStyles.length > 0) {
          document.getElementById('styleSection').style.display = 'block';
          document.getElementById('styleTags').innerHTML = codeStyles.map(s => `<span class="tag-pill tag-style">${s}</span>`).join('');
          document.getElementById('personalityBox').style.display = 'block';
          document.getElementById('personalityText').textContent = personality;
        } else {
          document.getElementById('styleSection').style.display = 'none';
        }

        // 显示诗歌（逐行动画）
        const linesContainer = document.getElementById('poemLines');
        linesContainer.innerHTML = content.map(line => `<p class="poem-line">${line}</p>`).join('');

        const lines = linesContainer.querySelectorAll('.poem-line');
        lines.forEach((line, index) => {
          setTimeout(() => {
            line.classList.add('visible');
          }, index * 400);
        });

      }, 1500);
    }

    function getStyleName(styleId) {
      const allStyles = [...poetryStyles.classic, ...poetryStyles.modern, ...poetryStyles.special];
      const style = allStyles.find(s => s.id === styleId);
      return style ? style.name : '诗';
    }

    function copyPoem() {
      if (!currentPoem) return;
      const text = currentPoem.content.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '已复制!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制诗句';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // 事件监听
    document.getElementById('codeInput').addEventListener('input', function() {
      updateCharCount();
      updateKeywordDisplay(this.value);
    });

    // 初始化
    initStyles();
    initExamples();
    updateCharCount();
  </script>
</body>
</html>
